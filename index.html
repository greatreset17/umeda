<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UMEDA — One Unbroken Piece</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0b0e14;font:12px/1.45 -apple-system,'Segoe UI','Hiragino Sans',sans-serif;color:#e8e4da}
canvas{display:block}
#boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0e14;z-index:40;letter-spacing:.45em;font-size:22px;transition:opacity .7s}
#boot span{font-size:11px;letter-spacing:.22em;opacity:.55;margin-top:12px}
#ui{position:fixed;top:14px;left:14px;z-index:20;background:rgba(12,14,20,.68);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;min-width:196px}
.ttl{font-size:13px;letter-spacing:.2em;font-weight:600}
.ttl span{opacity:.5;font-size:10px;letter-spacing:.08em;margin-left:6px}
#ui .row{display:flex;gap:6px}
button{cursor:pointer;background:rgba(255,255,255,.07);color:#e8e4da;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 9px;font-size:11px}
button:hover{background:rgba(255,255,255,.16)}
button.on{background:#c98a3d;border-color:#c98a3d;color:#14100a}
label{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;opacity:.9}
input[type=range]{width:96px;accent-color:#c98a3d}
select{background:rgba(20,22,30,.9);color:#e8e4da;border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:3px}
#presets{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20;background:rgba(12,14,20,.55);backdrop-filter:blur(10px);padding:6px;border-radius:12px;border:1px solid rgba(255,255,255,.08);flex-wrap:wrap;justify-content:center}
#hint{position:fixed;bottom:16px;left:16px;font-size:10px;opacity:.45;z-index:20}
body.photo #ui,body.photo #presets,body.photo #hint{display:none}
</style>
</head>
<body>
<div id="boot">UMEDA<span>assembling one unbroken piece…</span></div>
<div id="ui">
  <div class="row ttl">UMEDA<span>river to river</span></div>
  <div class="row" id="lightRow">
    <button data-l="golden" class="on">Golden</button><button data-l="noon">Noon</button><button data-l="dusk">Dusk</button>
  </div>
  <label>Trains <input id="trainD" type="range" min="0.2" max="1" step="0.05" value="1"></label>
  <label>Traffic <input id="carD" type="range" min="0.1" max="1" step="0.05" value="1"></label>
  <label>Quality <select id="qual"><option value="high" selected>High</option><option value="med">Balanced</option><option value="low">Light</option></select></label>
  <div class="row"><button id="photo">Photo</button><button id="reset">Reset view</button></div>
</div>
<div id="presets">
  <button data-p="hero">Hero</button><button data-p="sky">Sky Bldg</button><button data-p="hep">HEP Five</button>
  <button data-p="roof">Station Roof</button><button data-p="green">Grand Green</button>
  <button data-p="yodo">Yodo Sweep</button><button data-p="mido">Midosuji Dive</button>
</div>
<div id="hint">drag orbit · right-drag pan · wheel dive · P photo</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

/* ================= 0. helpers / shared state ================= */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const R=mulberry32(20260705);
const rr=(a,b)=>a+(b-a)*R();
const pick=a=>a[(R()*a.length)|0];
const F=x=>Number(x).toFixed(3);
const clamp=(x,a,b)=>Math.min(b,Math.max(a,x));
const smooth=(a,b,x)=>{const t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);};
const V3=(x,y,z)=>new THREE.Vector3(x,y,z);

const XMIN=-1600,XMAX=1600,ZMIN=-1800,ZMAX=1600;
const U={uTime:{value:0},uDusk:{value:0.10},uLow:{value:0}};

const GBOT=new THREE.BoxGeometry(1,1,1); GBOT.translate(0,0.5,0);   // bottom-origin unit box
const GCTR=new THREE.BoxGeometry(1,1,1);                            // centered unit box
const DUM=new THREE.Object3D(); const TMPV=new THREE.Vector3();

/* ================= 1. renderer / scene / camera ================= */
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.12;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,2,20000);
camera.position.set(-2150,1560,2420);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(60,0,-140);
controls.enableDamping=true; controls.dampingFactor=0.055;
controls.minDistance=36; controls.maxDistance=4600;
controls.maxPolarAngle=1.52;
scene.fog=new THREE.Fog(0xe9bd8c,1500,6200);

/* ================= 2. light state machine (golden / noon / dusk) ================= */
const LIGHTS={
  golden:{sun:[-0.72,0.20,0.40],sunCol:0xffb066,sunI:2.4,hemiS:0x8fb4e8,hemiG:0x9a7a5c,hemiI:0.50,
          top:0x35608f,hor:0xffbf80,fog:0xe9bd8c,dusk:0.10,exp:1.12},
  noon:  {sun:[0.22,1.00,0.30],sunCol:0xffffff,sunI:2.7,hemiS:0xbcd8ff,hemiG:0x8d8d84,hemiI:0.65,
          top:0x2e6fce,hor:0xd9ecf6,fog:0xdcecf4,dusk:0.00,exp:1.00},
  dusk:  {sun:[-0.70,0.05,0.42],sunCol:0xff6a35,sunI:0.45,hemiS:0x2c3160,hemiG:0x191720,hemiI:0.30,
          top:0x0a1026,hor:0x4a2c50,fog:0x241d33,dusk:1.00,exp:0.98}
};
const cur={sun:V3(-0.72,0.20,0.40).normalize(),sunCol:new THREE.Color(0xffb066),sunI:2.4,
  hemiS:new THREE.Color(0x8fb4e8),hemiG:new THREE.Color(0x9a7a5c),hemiI:0.5,
  top:new THREE.Color(0x35608f),hor:new THREE.Color(0xffbf80),fogC:new THREE.Color(0xe9bd8c),
  dusk:0.10,exp:1.12};
const tgtL={sun:cur.sun.clone(),sunCol:cur.sunCol.clone(),sunI:2.4,
  hemiS:cur.hemiS.clone(),hemiG:cur.hemiG.clone(),hemiI:0.5,
  top:cur.top.clone(),hor:cur.hor.clone(),fogC:cur.fogC.clone(),dusk:0.10,exp:1.12};
function setLight(name){
  const p=LIGHTS[name];
  tgtL.sun.set(p.sun[0],p.sun[1],p.sun[2]).normalize();
  tgtL.sunCol.setHex(p.sunCol); tgtL.sunI=p.sunI;
  tgtL.hemiS.setHex(p.hemiS); tgtL.hemiG.setHex(p.hemiG); tgtL.hemiI=p.hemiI;
  tgtL.top.setHex(p.top); tgtL.hor.setHex(p.hor); tgtL.fogC.setHex(p.fog);
  tgtL.dusk=p.dusk; tgtL.exp=p.exp;
  document.querySelectorAll('#lightRow button').forEach(b=>b.classList.toggle('on',b.dataset.l===name));
}

const sun=new THREE.DirectionalLight(0xffb066,2.4);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-1950; sun.shadow.camera.right=1950;
sun.shadow.camera.top=2050; sun.shadow.camera.bottom=-2050;
sun.shadow.camera.near=300; sun.shadow.camera.far=7200;
sun.shadow.camera.updateProjectionMatrix();
sun.shadow.bias=-0.0006;
scene.add(sun,sun.target);
const hemi=new THREE.HemisphereLight(0x8fb4e8,0x9a7a5c,0.5); scene.add(hemi);

/* ================= 3. sky dome ================= */
const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,
  uniforms:{uTop:{value:cur.top},uHor:{value:cur.hor},uSunDir:{value:cur.sun},uSunCol:{value:cur.sunCol},uDusk:U.uDusk},
  vertexShader:`varying vec3 vDir;
    void main(){ vDir=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`varying vec3 vDir;
    uniform vec3 uTop,uHor,uSunCol,uSunDir; uniform float uDusk;
    float h3(vec3 p){ return fract(sin(dot(p,vec3(12.98,78.23,45.16)))*43758.5453); }
    void main(){
      vec3 d=normalize(vDir);
      float t=clamp(d.y,0.0,1.0);
      vec3 col=mix(uHor,uTop,pow(t,0.55));
      col=mix(col,uHor*0.55,smoothstep(0.0,-0.25,d.y));
      float s=clamp(dot(d,normalize(uSunDir)),0.0,1.0);
      col+=uSunCol*(pow(s,900.0)*2.4+pow(s,24.0)*0.4+pow(s,4.0)*0.14);
      float st=step(0.9974,h3(floor(d*260.0)));
      col+=vec3(0.85,0.9,1.0)*st*smoothstep(0.10,0.4,d.y)*uDusk*uDusk;
      gl_FragColor=vec4(col,1.0);
      #include <tonemapping_fragment>
      #include <colorspace_fragment>
    }`});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(7600,32,16),skyMat));

/* ================= 4. window-shader patch (the billion-piece trick) =================
   Every facade in the city shares one procedural window system: world-space cells,
   per-instance hash, progressive dusk ignition (each window has its own threshold). */
function patchWindows(mat,o={}){
  const cw=F(o.cw??3.1), ch=F(o.ch??3.9), base=F(o.base??0.05),
        duskP=F(o.duskP??0.80), glow=F(o.glow??1.0), inst=o.inst!==false;
  if(!inst && mat.userData.rand===undefined) mat.userData.rand=R()*100;
  mat.onBeforeCompile=s=>{
    s.uniforms.uTime=U.uTime; s.uniforms.uDusk=U.uDusk; s.uniforms.uLow=U.uLow;
    if(!inst) s.uniforms.uRand={value:mat.userData.rand};
    s.vertexShader=s.vertexShader
      .replace('#include <common>',
        `#include <common>
         varying vec3 vWPos; varying vec3 vWNrm; varying float vRand;
         ${inst?'attribute float aRand;':'uniform float uRand;'}`)
      .replace('#include <worldpos_vertex>',
        `#include <worldpos_vertex>
         vec4 _wp=vec4(transformed,1.0);
         #ifdef USE_INSTANCING
           _wp=instanceMatrix*_wp;
         #endif
         _wp=modelMatrix*_wp; vWPos=_wp.xyz;
         vec3 _n=objectNormal;
         #ifdef USE_INSTANCING
           _n=mat3(instanceMatrix)*_n;
         #endif
         vWNrm=normalize(mat3(modelMatrix)*_n);
         vRand=${inst?'aRand':'uRand'};`);
    s.fragmentShader=s.fragmentShader
      .replace('#include <common>',
        `#include <common>
         varying vec3 vWPos; varying vec3 vWNrm; varying float vRand;
         uniform float uDusk; uniform float uTime; uniform float uLow;
         float whash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }`)
      .replace('#include <roughnessmap_fragment>',
        `#include <roughnessmap_fragment>
         roughnessFactor=clamp(roughnessFactor*(0.45+1.2*fract(vRand*7.13)),0.06,1.0);`)
      .replace('#include <emissivemap_fragment>',
        `#include <emissivemap_fragment>
         {
           vec3 wn=normalize(vWNrm);
           if(abs(wn.y)<0.5){
             float along=(abs(wn.x)>abs(wn.z))?vWPos.z:vWPos.x;
             vec2 wc=vec2(along/${cw},vWPos.y/${ch});
             vec2 cell=floor(wc); vec2 wf=fract(wc);
             float frame=step(0.15,wf.x)*step(wf.x,0.85)*step(0.18,wf.y)*step(wf.y,0.86);
             float hh=whash(cell+floor(vRand*97.0)*13.7);
             float lit=frame*step(hh,mix(${base},${duskP},pow(uDusk,1.3)));
             vec3 wcol=mix(vec3(1.0,0.72,0.42),vec3(0.72,0.84,1.0),step(0.87,fract(hh*9.31)));
             totalEmissiveRadiance+=wcol*lit*(0.30+2.1*uDusk)*(0.45+0.55*fract(hh*5.7))*${glow};
             diffuseColor.rgb*=mix(1.0,0.78,frame*(1.0-lit)*0.65);
           }
         }`);
  };
  return mat;
}

/* neon accents (wheel, observatory ring, crowns…) get emissive ramped with dusk */
const NEON=[];
function neon(mat,col,k=1){ mat.emissive=new THREE.Color(col); NEON.push({mat,k}); return mat; }
/* ================= 5. ground canvas — the aerial-photo layer =================
   One 2048px canvas carries the whole street fabric (albedo) and a second one
   carries the sodium/neon street glow used as emissiveMap after dark. */
const CV=2048;
const gc=document.createElement('canvas'); gc.width=gc.height=CV;
const g2=gc.getContext('2d');
const ec=document.createElement('canvas'); ec.width=ec.height=CV;
const e2=ec.getContext('2d');
const cx=x=>(x-XMIN)/(XMAX-XMIN)*CV;
const cz=z=>(z-ZMIN)/(ZMAX-ZMIN)*CV;
const sx=w=>w/(XMAX-XMIN)*CV;
const szl=d=>d/(ZMAX-ZMIN)*CV;
function rectC(ctx,x0,z0,x1,z1,fill){ctx.fillStyle=fill;ctx.fillRect(cx(x0),cz(z0),sx(x1-x0),szl(z1-z0));}
function lineC(ctx,x0,z0,x1,z1,col,w){ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(cx(x0),cz(z0));ctx.lineTo(cx(x1),cz(z1));ctx.stroke();}
g2.fillStyle='#2a2d33'; g2.fillRect(0,0,CV,CV);
e2.fillStyle='#000';    e2.fillRect(0,0,CV,CV);

/* --- exclusion zones: nothing procedural may grow here --- */
const EXCL=[];
const EX=(x0,z0,x1,z1)=>EXCL.push([x0,z0,x1,z1]);
function isBlocked(x0,z0,x1,z1){
  for(const e of EXCL) if(x0<e[2]&&x1>e[0]&&z0<e[3]&&z1>e[1]) return true;
  return false;
}
EX(-2600,-1520,2600,-1040);         // Yodo river
EX(-2600,1040,2600,1140);           // Dojima river
EX(-2600,1330,2600,1420);           // Tosabori river
EX(230,-1050,435,-20);              // N-S rail corridor (Hankyu + Umekita line)
EX(-1600,-45,1600,58);              // JR E-W corridor
EX(-300,-110,300,150);              // Osaka Station City core
EX(-460,-560,-100,-110);            // Grand Green Osaka (Umekita Park)
EX(490,-260,552,1600);              // Midosuji
EX(-150,60,-92,1600);               // Yotsubashi-suji
EX(-1600,410,1600,455);             // Sonezaki-dori
EX(-1600,970,1600,1015);            // Hanshin Expwy E-W + riverside road
EX(-702,-200,-655,970);             // Hanshin Expwy N-S leg
EX(598,-560,640,55);                // Chayamachi street
EX(-1600,-1042,1600,-975);          // south riverside road strip
EX(-1600,-1580,1600,-1538);         // Juso north-bank road
EX(-175,-975,-122,-200);            // Juso-ohashi approach

/* --- major surfaces painted before districts --- */
// rivers (deep base under the animated water planes) + green embankments
rectC(g2,-1600,-1545,1600,-1015,'#0e1d2a');
rectC(g2,-1600,-1042,1600,-1012,'#55703f');
rectC(g2,-1600,-1548,1600,-1520,'#55703f');
rectC(g2,-1600,1032,1600,1148,'#0e1d2a');
rectC(g2,-1600,1322,1600,1428,'#0e1d2a');
// rail corridors: slate beds + rail hairlines
rectC(g2,225,-1050,440,-15,'#33363b');
for(let x=238;x<436;x+=9) lineC(g2,x,-1050,x,-20,'#4a4e55',1);
rectC(g2,-1600,-40,1600,55,'#33363b');
for(let z=-32;z<52;z+=9) lineC(g2,-1600,z,1600,z,'#4a4e55',1);
// Hankyu terminal throat fan
g2.fillStyle='#3a3d43';
g2.beginPath();
g2.moveTo(cx(245),cz(-40)); g2.lineTo(cx(430),cz(-40));
g2.lineTo(cx(360),cz(-330)); g2.lineTo(cx(285),cz(-330));
g2.closePath(); g2.fill();
// station plazas + concourse aprons
rectC(g2,-260,60,260,155,'#4b4e55');
rectC(g2,-300,-115,300,-55,'#484b52');
// major roads
rectC(g2,494,-260,548,1600,'#3a3d42');            // Midosuji
rectC(g2,-146,60,-96,1600,'#3a3d42');             // Yotsubashi-suji
rectC(g2,-1600,412,1600,452,'#3a3d42');           // Sonezaki-dori
rectC(g2,600,-560,638,55,'#393c41');              // Chayamachi st
rectC(g2,-1600,-1040,1600,-1002,'#37393e');       // south riverside rd
rectC(g2,-1600,-1578,1600,-1540,'#37393e');       // Juso north-bank rd
rectC(g2,-1600,1008,1600,1034,'#37393e');         // Dojima riverside rd
rectC(g2,-1600,1216,1600,1246,'#37393e');         // Nakanoshima-dori
// Midosuji ginkgo median dots
g2.fillStyle='#4d6b35';
for(let z=-240;z<1580;z+=26){
  if((z>1030&&z<1150)||(z>1320&&z<1430)) continue;
  g2.beginPath(); g2.arc(cx(521),cz(z),1.4,0,7); g2.fill();
}
// Grand Green Osaka — the green counterweight
rectC(g2,-460,-560,-100,-110,'#4d7a42');
g2.fillStyle='rgba(120,160,86,0.85)';
g2.beginPath(); g2.ellipse(cx(-290),cz(-300),sx(120),szl(95),0,0,7); g2.fill();
g2.fillStyle='rgba(96,138,70,0.9)';
g2.beginPath(); g2.ellipse(cx(-190),cz(-460),sx(70),szl(50),0,0,7); g2.fill();
g2.strokeStyle='#cfc5a8'; g2.lineWidth=3;
g2.beginPath(); g2.moveTo(cx(-450),cz(-140)); g2.quadraticCurveTo(cx(-300),cz(-300),cx(-130),cz(-500)); g2.stroke();
g2.beginPath(); g2.moveTo(cx(-440),cz(-500)); g2.quadraticCurveTo(cx(-280),cz(-360),cx(-115),cz(-150)); g2.stroke();
g2.beginPath(); g2.ellipse(cx(-290),cz(-330),sx(66),szl(30),0,0,7); g2.stroke();
rectC(g2,-330,-352,-250,-308,'#1c3b4d');          // reflecting pool bed
// Nakanoshima: civic island with its eastern rose-garden strip
rectC(g2,-700,1148,1600,1324,'#494c46');
rectC(g2,500,1155,1180,1318,'#4d7244');
lineC(g2,510,1236,1170,1236,'#cfc5a8',3);
// west-of-station plaza (Umekita 2nd-phase lawn apron)
rectC(g2,-460,-105,-290,150,'#455041');

/* --- street-glow emissive strokes for the majors --- */
lineC(e2,521,-250,521,1590,'rgba(255,185,105,0.9)',4);
lineC(e2,-121,70,-121,1590,'rgba(255,185,105,0.8)',3);
lineC(e2,-1590,432,1590,432,'rgba(255,185,105,0.8)',3);
lineC(e2,619,-550,619,45,'rgba(255,170,120,0.8)',3);
lineC(e2,-1590,-1021,1590,-1021,'rgba(255,185,105,0.6)',3);
lineC(e2,-1590,-1559,1590,-1559,'rgba(255,185,105,0.6)',3);
lineC(e2,-1590,1021,1590,1021,'rgba(255,185,105,0.6)',3);
lineC(e2,-1590,1231,1590,1231,'rgba(255,185,105,0.6)',3);
// station concourse pool of light
e2.fillStyle='rgba(255,205,150,0.55)';
e2.fillRect(cx(-260),cz(-60),sx(520),szl(215));
// neon wash blobs in the nightlife quarters (Chayamachi / Kita-Shinchi / Doyama / Juso)
const NEONZ=[[440,-560,730,-40],[ -80,455,520,1000],[440,60,940,400],[-1300,-1780,1300,-1545]];
for(const zz of NEONZ){
  const n=((zz[2]-zz[0])*(zz[3]-zz[1]))/2600|0;
  for(let i=0;i<n;i++){
    e2.fillStyle=`hsla(${(R()*360)|0},95%,62%,0.5)`;
    e2.beginPath(); e2.arc(cx(rr(zz[0],zz[2])),cz(rr(zz[1],zz[3])),rr(1.5,4.5),0,7); e2.fill();
  }
}

/* --- ground + earth meshes --- */
const groundTex=new THREE.CanvasTexture(gc); groundTex.colorSpace=THREE.SRGBColorSpace; groundTex.anisotropy=8;
const groundEm=new THREE.CanvasTexture(ec); groundEm.colorSpace=THREE.SRGBColorSpace;
const groundMat=new THREE.MeshStandardMaterial({map:groundTex,emissiveMap:groundEm,emissive:0xffffff,emissiveIntensity:0,roughness:0.96,metalness:0});
groundMat.onBeforeCompile=s=>{
  s.uniforms.uTime=U.uTime; s.uniforms.uDusk=U.uDusk;
  s.vertexShader=s.vertexShader
    .replace('#include <common>','#include <common>\nvarying vec3 vGPos;')
    .replace('#include <worldpos_vertex>','#include <worldpos_vertex>\n vGPos=(modelMatrix*vec4(transformed,1.0)).xyz;');
  s.fragmentShader=s.fragmentShader
    .replace('#include <common>',
      `#include <common>
       varying vec3 vGPos; uniform float uTime; uniform float uDusk;
       float gh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
       float gn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);
         return mix(mix(gh(i),gh(i+vec2(1,0)),f.x),mix(gh(i+vec2(0,1)),gh(i+vec2(1,1)),f.x),f.y);}`)
    .replace('#include <map_fragment>',
      `#include <map_fragment>
       float cl=gn(vGPos.xz*0.0012+vec2(uTime*0.011,uTime*0.004));
       cl=0.5*cl+0.5*gn(vGPos.xz*0.0031-vec2(uTime*0.02,0.0));

function addSign(x,z,w,dp,h){
  const f=(R()*4)|0; let px=x,pz=z,ry=0;
  if(f===0){pz=z-dp/2-0.6;ry=Math.PI;} else if(f===1){pz=z+dp/2+0.6;ry=0;}
  else if(f===2){px=x-w/2-0.6;ry=-Math.PI/2;} else {px=x+w/2+0.6;ry=Math.PI/2;}
  const vert=R()<0.4;
  const sw=vert?rr(2,3.2):Math.min(w*0.8,rr(6,16));
  const sh=vert?Math.min(h*0.75,rr(8,18)):rr(2.5,6);
  SIGNS.push({x:px,y:rr(5,Math.max(6.5,h*0.7)),z:pz,w:sw,h:sh,ry,c:pick(NEONC)});
}
for(const d of DISTRICTS){
  for(let bx=d.x0;bx<d.x1-4;bx+=d.pitch){
    for(let bz=d.z0;bz<d.z1-4;bz+=d.pitch){
      const b0x=bx+d.st/2,b0z=bz+d.st/2;
      const b1x=Math.min(bx+d.pitch-d.st/2,d.x1),b1z=Math.min(bz+d.pitch-d.st/2,d.z1);
      if(b1x-b0x<6||b1z-b0z<6) continue;
      if(isBlocked(b0x,b0z,b1x,b1z)) continue;
      if(d.side) rectC(g2,b0x,b0z,b1x,b1z,d.side);
      const nx=(b1x-b0x)>40&&R()<0.8?2:1, nz=(b1z-b0z)>40&&R()<0.8?2:1;
      for(let ix=0;ix<nx;ix++) for(let iz=0;iz<nz;iz++){
        if(R()<0.06) continue;
        const lw=(b1x-b0x)/nx, ld=(b1z-b0z)/nz;
        const w=lw*rr(0.6,0.9), dp=ld*rr(0.6,0.9);
        const x=b0x+lw*(ix+0.5)+rr(-1.5,1.5), z=b0z+ld*(iz+0.5)+rr(-1.5,1.5);
        let h=d.h[0]+(d.h[1]-d.h[0])*Math.pow(R(),1.6);
        if(R()<d.tall) h*=rr(1.8,2.8);
        BLD.push({x,z,w,d:dp,h,c:pick(d.pal),r:R()});
        if(h>150&&R()<0.8) WARN.push([x,h+2,z]);
        if(h>24) for(let k=0,K=1+(R()*3|0);k<K;k++)
          CLUT.push({x:x+rr(-w*0.3,w*0.3),z:z+rr(-dp*0.3,dp*0.3),y:h,w:rr(2,6),h:rr(1.5,4.5),d:rr(2,6)});
        if(d.sign>0&&h>13&&R()<d.sign) addSign(x,z,w,dp,h);
        if(d.sign>0&&h>40&&R()<0.18)
          SIGNS.push({x,y:h+3.5,z,w:Math.min(w*0.9,20),h:rr(3,6),ry:R()<0.5?0:Math.PI/2,c:pick(NEONC)});
      }
    }
  }
  if(d.side){
    e2.strokeStyle='rgba(255,180,100,0.32)'; e2.lineWidth=1.2;
    for(let bx=d.x0;bx<=d.x1;bx+=d.pitch){e2.beginPath();e2.moveTo(cx(bx),cz(d.z0));e2.lineTo(cx(bx),cz(d.z1));e2.stroke();}

  }
}

function offsetPts(pts,d){
  const out=[];
  for(let i=0;i<pts.length;i++){

    const dx=b.x-a.x,dz=b.z-a.z,L=Math.hypot(dx,dz)||1;
    out.push(V3(pts[i].x-dz/L*d,pts[i].y,pts[i].z+dx/L*d));
  }
  return out;
}

}

function addService(pts,o){
  const {c,len}=mkCurve(o.lat?offsetPts(pts,o.lat):pts);
  const stops=(o.stopPts||[]).map(sp=>closestS(c,len,sp));
  if(o.mode==='shuttle'){stops.push(0,len);}
  stops.sort((a,b)=>a-b);
  const n=o.n??1;
  for(let i=0;i<n;i++){
    const tr={c,len,stops,mode:o.mode||'wrap',dir:o.dir??1,v:0,state:'run',wait:0,
      vmax:o.vmax??22,acc:o.acc??0.9,dwellMid:o.dwellMid??9,dwellEnd:o.dwellEnd??16,
      cars:o.cars??8,base:carTotal,cols:[]};
    tr.carSpan=tr.cars*(CARL+0.8);
    if(tr.mode==='shuttle'){
      if(tr.dir>0){tr.s=1;tr.state='dwell';tr.wait=(o.phase??0)+i*46;}
      else{tr.s=len-1;tr.state='dwell';tr.wait=(o.phase??0)+22+i*46;}
    }else{
      tr.s=((len*(i+(o.phase??0)))/n)%len;
    }
    for(let ci=0;ci<tr.cars;ci++)
      tr.cols.push(o.alt!==undefined&&ci%2===1?o.alt:o.color);
    carTotal+=tr.cars;
    TRAINS.push(tr);
  }
}

function updateTrain(tr,dt){
  if(tr.state==='dwell'){
    tr.wait-=dt;
    if(tr.wait<=0) tr.state='run';
    return;
  }
  let next=Infinity,found=false;
  if(tr.dir>0){ for(const st of tr.stops) if(st>tr.s+2){next=st;found=true;break;} }
  else{ for(let i=tr.stops.length-1;i>=0;i--) if(tr.stops[i]<tr.s-2){next=tr.stops[i];found=true;break;} }
  const dist=found?Math.abs(next-tr.s):Infinity;
  const vstop=found?Math.sqrt(2*tr.acc*Math.max(dist-0.5,0)):Infinity;
  tr.v=Math.min(tr.v+tr.acc*dt,tr.vmax,Math.max(vstop,dist<8?1.4:0));
  if(found&&dist<0.8){
    tr.v=0; tr.state='dwell';
    const atEnd=next<=0.01||next>=tr.len-0.01;
    tr.wait=atEnd?tr.dwellEnd:tr.dwellMid;
    tr.s=next;
    if(tr.mode==='shuttle'&&atEnd) tr.dir*=-1;
    return;
  }
  tr.s+=tr.v*dt*tr.dir;
  if(tr.mode==='wrap'){
    if(tr.dir>0&&tr.s>tr.len+tr.carSpan+4) tr.s=-tr.carSpan-4;
    if(tr.dir<0&&tr.s<-tr.carSpan-4) tr.s=tr.len+tr.carSpan+4;
  }
}
function placeTrain(tr,ti){
  for(let i=0;i<tr.cars;i++){
    const s=tr.s-tr.dir*(i*(CARL+0.8)+CARL/2);
    const idx=tr.base+i;
    if(s<0.5||s>tr.len-0.5){
      DUM.position.set(0,-500,0); DUM.rotation.set(0,0,0); DUM.scale.set(0.001,0.001,0.001);
      DUM.updateMatrix(); trainInst.setMatrixAt(idx,DUM.matrix); continue;
    }
    const u=s/tr.len;
    const p=tr.c.getPointAt(u), tan=tr.c.getTangentAt(u);
    DUM.position.copy(p); TMPV.copy(p).add(tan); DUM.lookAt(TMPV); DUM.scale.set(1,1,1);
    DUM.updateMatrix(); trainInst.setMatrixAt(idx,DUM.matrix);
  }
  // lamps at the two ends of the consist
  const ends=[tr.s+tr.dir*0.8, tr.s-tr.dir*(tr.carSpan-0.8)];
  for(let e=0;e<2;e++){
    const s=ends[e], m=e===0?headInst:tailTInst;
    if(s<0.5||s>tr.len-0.5){
      DUM.position.set(0,-500,0); DUM.scale.set(0.001,0.001,0.001); DUM.rotation.set(0,0,0);
      DUM.updateMatrix(); m.setMatrixAt(ti,DUM.matrix); continue;
    }

    DUM.position.set(p.x,p.y+1.6,p.z); TMPV.set(p.x+tan.x,p.y+1.6+tan.y,p.z+tan.z);
    DUM.lookAt(TMPV); DUM.scale.set(1.8,0.5,0.4); DUM.updateMatrix();
    m.setMatrixAt(ti,DUM.matrix);
  }
}

/* --- viaducts, piers, river trusses, catenary --- */
const VD=[],PR=[],BR=[],CAT=[];
const TMP2=new THREE.Vector3(),TMP3=new THREE.Vector3();
function inWater(z){return(z>-1520&&z<-1040)||(z>1040&&z<1140)||(z>1330&&z<1420);}
function pushBar(a,b,th,arr){
  DUM.position.copy(a).add(b).multiplyScalar(0.5);
  DUM.lookAt(b); DUM.scale.set(th,th,a.distanceTo(b)); DUM.updateMatrix();
  (arr||BR).push(DUM.matrix.clone());
}
function buildWay(pts,width,opts={}){
  const {c,len}=mkCurve(pts);
  const step=26; let alt=false;
  for(let s=step/2;s<len;s+=step){
    const u=s/len, p=c.getPointAt(u), tan=c.getTangentAt(u);
    if(p.y<1.2){alt=!alt;continue;}
    DUM.position.set(p.x,p.y-1.05,p.z);
    TMPV.set(p.x+tan.x,p.y-1.05,p.z+tan.z); DUM.lookAt(TMPV);
    DUM.scale.set(width,1.5,step+0.8); DUM.updateMatrix(); VD.push(DUM.matrix.clone());
    const water=inWater(p.z);
    if(water&&!opts.noTruss){
      TMP2.set(-tan.z,0,tan.x).normalize();
      for(const sd of [-1,1]){
        const bx=p.x+TMP2.x*sd*width/2, bz=p.z+TMP2.z*sd*width/2;
        const fx=p.x+tan.x*step*0.5+TMP2.x*sd*width/2, fz=p.z+tan.z*step*0.5+TMP2.z*sd*width/2;
        const kx=p.x-tan.x*step*0.5+TMP2.x*sd*width/2, kz=p.z-tan.z*step*0.5+TMP2.z*sd*width/2;
        pushBar(V3(kx,p.y-1.6,kz),V3(bx,p.y+6.5,bz),0.7);
        pushBar(V3(bx,p.y+6.5,bz),V3(fx,p.y-1.6,fz),0.7);
        pushBar(V3(kx,p.y+6.8,kz),V3(fx,p.y+6.8,fz),0.8);
      }
    }else if(!water){
      alt=!alt;
      if(alt){
        DUM.position.set(p.x,0,p.z); DUM.rotation.set(0,0,0);
        DUM.scale.set(Math.min(width*0.42,3.4),Math.max(p.y-1.8,0.1),2.6);
        DUM.updateMatrix(); PR.push(DUM.matrix.clone());
      }
    }
    if(opts.cat&&Math.abs(p.x)<680&&p.z>-680&&p.z<380&&(s/step)%2<1){
      TMP2.set(-tan.z,0,tan.x).normalize();
      DUM.position.set(p.x+TMP2.x*(width/2+0.5),p.y,p.z+TMP2.z*(width/2+0.5));
      DUM.rotation.set(0,0,0); DUM.scale.set(0.35,6.4,0.35); DUM.updateMatrix(); CAT.push(DUM.matrix.clone());
      pushBar(V3(p.x+TMP2.x*(width/2+0.5),p.y+6.2,p.z+TMP2.z*(width/2+0.5)),
              V3(p.x-TMP2.x*(width/2-1),p.y+6.2,p.z-TMP2.z*(width/2-1)),0.22,CAT);
    }
  }
}

function roadSample(rd,s,out){
  s=((s%rd.len)+rd.len)%rd.len;
  let i=1; while(i<rd.cum.length-1&&rd.cum[i]<s) i++;
  const a=rd.p[i-1],b=rd.p[i],t=(s-rd.cum[i-1])/Math.max(rd.cum[i]-rd.cum[i-1],1e-6);
  out.pos.lerpVectors(a,b,t);
  out.dir.subVectors(b,a).normalize();
}

function updateTraffic(dt,t,nShow,lightsOn){
  for(let i=0;i<nShow;i++){
    const c=CARS[i];
    const wave=0.55+0.45*Math.sin(c.s*0.021-t*1.35+c.ph);
    c.s=(c.s+c.rd.speed*wave*dt+c.rd.len)%c.rd.len;
    const sEff=c.lane.dir>0?c.s:c.rd.len-c.s;
    roadSample(c.rd,sEff,RS);
    if(c.lane.dir<0) RS.dir.negate();
    TMP2.set(-RS.dir.z,0,RS.dir.x);
    DUM.position.copy(RS.pos).addScaledVector(TMP2,c.lane.off);
    TMPV.copy(DUM.position).add(RS.dir);
    DUM.lookAt(TMPV);
    DUM.scale.set(c.W,c.H,c.L);
    DUM.updateMatrix();
    carInst.setMatrixAt(i,DUM.matrix);
    if(lightsOn){
      TMP3.copy(DUM.position);
      DUM.scale.set(c.W*0.75,0.2,0.12);
      DUM.position.copy(TMP3).addScaledVector(RS.dir,c.L/2); DUM.position.y+=0.6;
      DUM.updateMatrix(); carHead.setMatrixAt(i,DUM.matrix);
      DUM.position.copy(TMP3).addScaledVector(RS.dir,-c.L/2); DUM.position.y+=0.6;
      DUM.updateMatrix(); carTail.setMatrixAt(i,DUM.matrix);
      if(c.taxi){DUM.position.copy(TMP3);DUM.position.y+=c.H+0.18;DUM.scale.set(0.55,0.28,0.75);}
      else DUM.scale.set(0.001,0.001,0.001);
      DUM.updateMatrix(); taxiTop.setMatrixAt(i,DUM.matrix);
    }
  }
  carInst.count=nShow;
  carInst.instanceMatrix.needsUpdate=true;
  carHead.count=carTail.count=taxiTop.count=lightsOn?nShow:0;
  if(lightsOn){carHead.instanceMatrix.needsUpdate=carTail.instanceMatrix.needsUpdate=taxiTop.instanceMatrix.needsUpdate=true;}
}

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=U.uTime.value+=dt;

  /* light state cross-fade — dusk mode ignites the city window by window */
  const k=1-Math.exp(-1.15*dt);
  cur.sun.lerp(tgtL.sun,k).normalize();
  cur.sunCol.lerp(tgtL.sunCol,k);
  cur.sunI+=(tgtL.sunI-cur.sunI)*k;
  cur.hemiS.lerp(tgtL.hemiS,k); cur.hemiG.lerp(tgtL.hemiG,k); cur.hemiI+=(tgtL.hemiI-cur.hemiI)*k;
  cur.top.lerp(tgtL.top,k); cur.hor.lerp(tgtL.hor,k); cur.fogC.lerp(tgtL.fogC,k);
  cur.dusk+=(tgtL.dusk-cur.dusk)*k; cur.exp+=(tgtL.exp-cur.exp)*k;
  U.uDusk.value=cur.dusk;
  sun.position.copy(cur.sun).multiplyScalar(2800);
  sun.color.copy(cur.sunCol); sun.intensity=cur.sunI;
  hemi.color.copy(cur.hemiS); hemi.groundColor.copy(cur.hemiG); hemi.intensity=cur.hemiI;
  scene.fog.color.copy(cur.fogC);
  renderer.toneMappingExposure=cur.exp;
  groundMat.emissiveIntensity=0.05+1.9*cur.dusk*cur.dusk;
  signMat.color.setScalar(0.42+2.6*cur.dusk);
  stairMat.color.setHex(0xffb35c).multiplyScalar(0.25+2.2*cur.dusk);
  waterMat.uniforms.uDeep.value.copy(_deepDay).lerp(_deepNight,cur.dusk);
  waterMat.uniforms.uRefl.value.copy(cur.hor);
  for(const n of NEON) n.mat.emissiveIntensity=0.12+2.3*cur.dusk*n.k;

  /* camera: tween + damped controls */
  if(tween){
    tween.u=Math.min(tween.u+dt/tween.dur,1);
    const e=tween.u<0.5?4*tween.u**3:1-Math.pow(-2*tween.u+2,3)/2;
    camera.position.lerpVectors(tween.p0,tween.p1,e);
    controls.target.lerpVectors(tween.t0,tween.t1,e);
    if(tween.u>=1) tween=null;
  }
  controls.update();
  const camDist=camera.position.distanceTo(controls.target);
  const qf=quality==='high'?1:quality==='med'?0.75:0.5;

  /* nested LOD — cross-faded, never popped */
  clutMat.opacity=1-smooth(1600,2600,camDist); clutInst.visible=camDist<2600;
  catMat.opacity=1-smooth(500,850,camDist);
  catInstA.visible=catInstB.visible=camDist<850;
  const pedsOn=camDist<1100&&quality!=='low';
  pedMat.opacity=1-smooth(750,1100,camDist);
  pedInst.visible=pedsOn;
  steamG.visible=camDist<520;

  /* trains — the bloodline, alive at every zoom */
  const nTr=Math.max(1,Math.round(TRAINS.length*parseFloat(trainSlider.value)));
  TRAINS.forEach((tr,i)=>{
    if(i<nTr){tr.off&&(tr.off=false); updateTrain(tr,dt); placeTrain(tr,i);}
    else if(!tr.off){tr.off=true; placeTrainOff(tr,i);}
  });
  trainInst.instanceMatrix.needsUpdate=true;
  headInst.instanceMatrix.needsUpdate=tailTInst.instanceMatrix.needsUpdate=true;

  /* street traffic */
  const nShow=Math.floor(CARS.length*parseFloat(carSlider.value)*qf);
  const lightsOn=cur.dusk>0.18||camDist<650;
  updateTraffic(dt,t,nShow,lightsOn);
  updateBuses(dt);
  if(pedsOn) updatePeds(dt,t);

  /* the crimson wheel, perpetually */
  wheel.hub.rotation.z+=dt*0.05;
  wheel.gondolas.forEach((g,i)=>{
    const a=wheel.hub.rotation.z+i*Math.PI*2/wheel.gondolas.length;
    g.position.set(Math.cos(a)*44,Math.sin(a)*44-2.2,0);
    g.visible=camDist<1600;
  });

  /* boats, helicopter, jet, birds, steam, beacons */
  updateBoats(dt);
  {
    const ha=-t*0.055;
    heli.position.set(Math.sin(ha)*620,240,-900+Math.cos(ha)*620);
    TMPV.set(Math.sin(ha-0.05)*620,240,-900+Math.cos(ha-0.05)*620);
    heli.lookAt(TMPV);
    heli.getObjectByName('rotor').rotation.y+=dt*28;
  }
  {
    const ju=(t%80)/80;
    jet.position.set(-2600+5200*ju,720-160*ju,2000-4300*ju);
    TMPV.set(jet.position.x+52,jet.position.y-1.6,jet.position.z-43);
    jet.lookAt(TMPV);
  }
  for(const b of birds){
    b.a+=b.va*dt;
    b.m.position.set(-280+Math.cos(b.a)*b.r,b.y+Math.sin(t*2+b.ph)*4,-330+Math.sin(b.a)*b.r);
    b.m.rotation.y=-b.a;
    b.m.scale.y=0.05+0.3*Math.abs(Math.sin(t*7+b.ph));
  }
  if(steamG.visible) for(const s of STEAM){
    const y=((t*s.sp)+s.ph)%12;
    s.s.position.y=1+y;
    s.s.material.opacity=0.32*(1-y/12);
    s.s.scale.set(3+y*0.8,3+y*0.8,1);
  }
  updateWarn(t);

  renderer.render(scene,camera);
  if(!booted){
    booted=true;
    const bo=document.getElementById('boot');
    bo.style.opacity='0'; setTimeout(()=>bo.remove(),750);
  }
}
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
setLight('golden');
tick();
</script>
</body>
</html>
